{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="{% static 'jetcommerce.svg' %}">

    <title>
        {% block title %}
        Dashboard
        {% endblock %}
    </title>

    <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.min.css' %}">

    <style>
      html, body, .app-wrapper, .app-main, .app-content {
        background:
          radial-gradient(ellipse 70% 45% at 85% 5%,  rgba(255,100,0,0.13) 0%, transparent 70%),
          radial-gradient(ellipse 55% 35% at 5%  90%, rgba(200, 60,0,0.13) 0%, transparent 70%),
          #fffcfb !important;
      }
      /* hapus bg putih dari container AdminLTE */
      .bg-body-tertiary { background: transparent !important; }
      .app-content      { background: transparent !important; }
    </style>

    {% block extra_css %}
    {% endblock %}
</head>

<body class="layout-fixed sidebar-expand-lg">

<div class="app-wrapper">

    {% include "partials/navbar.html" %}
    {% include "partials/sidebar.html" %}

    <main class="app-main">

        <div class="app-content">

            <div class="container-fluid py-3">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </main>

    {% include "partials/footer.html" %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{% static 'adminlte/dist/js/adminlte.min.js' %}"></script>

{% block extra_js %}
{% endblock %}

</body>
</html>
