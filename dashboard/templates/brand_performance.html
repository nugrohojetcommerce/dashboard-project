{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Performance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Custom base utility & dark theme tweaks */
        body {
            background-color: #0f0f0e;
            color: #d4d1cb;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .text-muted-custom { color: #555555; }
        .bg-card-custom { background-color: #1a1a18; border: 0.5px solid #252523; }
        .border-custom { border-color: #252523 !important; }
        
        /* Form control overrides for dark look */
        .form-control-dark {
            background-color: #1a1a18;
            border: 0.5px solid #2e2e2b;
            color: #d4d1cb;
        }
        .form-control-dark:focus {
            background-color: #1a1a18;
            border-color: #1D9E75;
            color: #d4d1cb;
            box-shadow: none;
        }

        /* Live dot animation */
        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1D9E75;
        }

        /* Loading Overlay overlayed on relative card */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 15, 14, 0.75);
            z-index: 10;
        }
    </style>
</head>
<body class="py-4 px-3 px-md-5">

    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom border-custom">
        <div>
            <h1 class="h6 fw-bold text-light m-0 d-flex align-items-center gap-2">
                <i class="fa-solid fa-chart-pie text-success"></i> Brand performance
            </h1>
            <div class="small text-muted-custom d-flex align-items-center gap-2 mt-1">
                <span class="live-dot"></span> Real-time &middot; Django ORM service layer
            </div>
        </div>
        <div class="small text-muted-custom d-flex align-items-center gap-2">
            <i class="fa-regular fa-calendar"></i> Jun 2026
        </div>
    </div>

    <div class="row g-3 mb-4 align-items-end">
        <div class="col-6 col-md">
            <label for="platform" class="form-label small text-uppercase text-muted-custom fw-semibold tracking-wider m-1" style="font-size: 11px;">Brand</label>
            <select id="platform" class="form-select form-control-dark">
                <option value="all">All</option>
                <option value="Shopee">Shopee</option>
                <option value="Tiktok">TikTok</option>
                <option value="Lazada">Lazada</option>
            </select>
        </div>
        <div class="col-6 col-md">
            <label for="brand" class="form-label small text-uppercase text-muted-custom fw-semibold tracking-wider m-1" style="font-size: 11px;">Brand</label>
            <select id="brand" class="form-select form-control-dark">
                {% for b in brands %}
                <option value="{{ b }}">{{ b }}</option>
                {% empty %}
                <option value="all">All brands</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-6 col-md">
            <label for="start_date" class="form-label small text-uppercase text-muted-custom fw-semibold tracking-wider m-1" style="font-size: 11px;">Start date</label>
            <input type="date" id="start_date" class="form-control form-control-dark" value="2026-06-01">
        </div>
        <div class="col-6 col-md">
            <label for="end_date" class="form-label small text-uppercase text-muted-custom fw-semibold tracking-wider m-1" style="font-size: 11px;">End date</label>
            <input type="date" id="end_date" class="form-control form-control-dark" value="2026-06-05">
        </div>
        <div class="col-6 col-md">
            <button id="loadData" class="btn text-white w-100 fw-semibold d-flex align-items-center justify-content-center gap-2" style="background-color: #1D9E75;">
                <i class="fa-solid fa-arrows-rotate"></i> Load
            </button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
            <div class="card bg-card-custom p-3 rounded-3 h-100 border-0">
                <div class="small text-uppercase text-muted-custom fw-semibold tracking-wider mb-2" style="font-size: 11px;">Net merchandise value</div>
                <div class="h4 fw-bold text-light mb-2" id="val_nmv">Rp 0</div>
                <div style="height: 2px; width: 28px; background: #1D9E75; border-radius: 1px;"></div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card bg-card-custom p-3 rounded-3 h-100 border-0">
                <div class="small text-uppercase text-muted-custom fw-semibold tracking-wider mb-2" style="font-size: 11px;">Gross merchandise value</div>
                <div class="h4 fw-bold text-light mb-2" id="val_gmv">Rp 0</div>
                <div style="height: 2px; width: 28px; background: #7F77DD; border-radius: 1px;"></div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card bg-card-custom p-3 rounded-3 h-100 border-0">
                <div class="small text-uppercase text-muted-custom fw-semibold tracking-wider mb-2" style="font-size: 11px;">Net order qty</div>
                <div class="h4 fw-bold text-light mb-2" id="val_net_order">0</div>
                <div style="height: 2px; width: 28px; background: #EF9F27; border-radius: 1px;"></div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card bg-card-custom p-3 rounded-3 h-100 border-0">
                <div class="small text-uppercase text-muted-custom fw-semibold tracking-wider mb-2" style="font-size: 11px;">Net product sales qty</div>
                <div class="h4 fw-bold text-light mb-2" id="val_net_quantity">0</div>
                <div style="height: 2px; width: 28px; background: #D4537E; border-radius: 1px;"></div>
            </div>
        </div>
    </div>

    <div class="card bg-card-custom p-4 rounded-3 position-relative border-0">
        <div class="loading-overlay rounded-3 align-items-center justify-content-center" id="loadingBox">
            <div class="spinner-border text-success" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="small fw-medium text-secondary d-flex align-items-center gap-2" style="font-size: 13px;">
                <i class="fa-solid fa-chart-line text-success"></i> NMV trend over time
            </div>
            <span class="badge rounded-pill px-2 py-1" style="background-color: #085041; color: #9FE1CB; font-size: 11px;">NMV · IDR</span>
        </div>
        
        <div style="position: relative; height: 300px;">
            <canvas id="chart-nmv-line"></canvas>
        </div>
    </div>
    <script>
        let chartInstance;

        function formatIDR(val) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);
        }
        
        function formatNum(val) {
            return new Intl.NumberFormat('id-ID').format(val);
        }

        function loadDashboardData() {
            $("#loadingBox").addClass('d-flex');

            const params = {
                start_date: $("#start_date").val(),
                end_date: $("#end_date").val(),
                brand: $("#brand").val(),
                platform: $("#platform").val()
            };

            $.get("/api/brand_performance", params, function(response) {
                $("#loadingBox").removeClass('d-flex');

                $("#val_nmv").text(formatIDR(response.cards.total_nmv));
                $("#val_gmv").text(formatIDR(response.cards.total_gmv));
                $("#val_net_order").text(formatNum(response.cards.total_net_order));
                $("#val_net_quantity").text(formatNum(response.cards.total_net_quantity));

                const labels = response.trend.map(item => item.date);
                const values = response.trend.map(item => item.gmv);

                if (chartInstance) {
                    chartInstance.data.labels = labels;
                    chartInstance.data.datasets[0].data = values;
                    chartInstance.update();
                } else {
                    const ctx = document.getElementById('chart-nmv-line').getContext('2d');
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'NMV (IDR)',
                                data: values,
                                borderColor: '#1D9E75',
                                backgroundColor: 'rgba(29,158,117,0.08)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.3,
                                pointRadius: 4,
                                pointBackgroundColor: '#1D9E75',
                                pointBorderColor: '#1a1a18',
                                pointBorderWidth: 2,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1a1a18',
                                    borderColor: '#2e2e2b',
                                    borderWidth: 1,
                                    titleColor: '#d4d1cb',
                                    bodyColor: '#9FE1CB',
                                    padding: 12,
                                    callbacks: {
                                        label: ctx => '  ' + formatIDR(ctx.raw)
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    grid: { color: 'rgba(255,255,255,0.04)' },
                                    ticks: {
                                        color: '#555',
                                        font: { size: 11 },
                                        callback: v => 'Rp ' + Intl.NumberFormat('id-ID', { notation: 'compact' }).format(v)
                                    },
                                    border: { display: false }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#555', font: { size: 11 } },
                                    border: { display: false }
                                }
                            }
                        }
                    });
                }
            });
        }

        $("#loadData").click(loadDashboardData);
        $("#start_date, #end_date, #brand, #platform").change(loadDashboardData);
        $(document).ready(loadDashboardData);
    </script>
</body>
</html>
