<style>
.app-header {
  position: sticky;
  top: 0;
  z-index: 1030;
}

.app-header nav {
  background: rgba(255, 255, 255, 0.03) !important;
  border-bottom: 1px solid rgba(255, 122, 0, 0.15) !important;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.app-header .nav-link {
  color: #B08060 !important;
  transition: color .18s;
}
.app-header .nav-link:hover {
  color: #FF7A00 !important;
}

.navbar-username {
  font-size: .78rem;
  font-weight: 600;
  color: #705040 !important;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .04em;
}

.sidebar-toggle {
  font-size: 1.1rem;
  color: #B08060 !important;
  line-height: 1;
}
.sidebar-toggle:hover { color: #FF7A00 !important; }
</style>

<nav class="app-header navbar navbar-expand bg-body">
    <div class="container-fluid">

        <ul class="navbar-nav">
            <li class="nav-item" style="display: flex; align-items: center; gap: 12px;">
                <a class="nav-link sidebar-toggle" data-lte-toggle="sidebar" href="#">☰</a>
                {% load static %}
                <a class="logo">
                    <img src="{% static 'jetcommerce.svg' %}" alt="Jetcommerce Logo" style="height: 30px; width: auto;">
                </a>
            </li>
        </ul>

        <ul class="navbar-nav">
            <span class ="nav-link">
                Jetcommerce Dashboard
            </span>
        </ul>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="{% url 'update_profile' %}" class="nav-link navbar-username">{{ request.user.username }}</a>
                <!-- <span class="nav-link navbar-username">{{ request.user.username }}</span> -->
            </li>
        </ul>

    </div>
</nav>
