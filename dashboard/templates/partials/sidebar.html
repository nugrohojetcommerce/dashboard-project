<style>
  /* ── SIDEBAR OFF-WHITE MINIMALIS (MATCHING LIGHT MODE) ── */
  .app-sidebar {
    /* Sedikit lebih solid/abu dari bg-page (#F8F9FA) agar distinctive */
    background: #FFFFFF !important; 
    border-right: 1px solid #E4E7EB !important; /* Garis pembatas super bersih */
    /* Kasih shadow agak tegas ke kanan biar kelihatan terpisah pas kebuka */
    box-shadow: 6px 0 24px rgba(0, 0, 0, 0.03) !important; 
  }

  .sidebar-brand {
    padding: 18px 24px;
    border-bottom: 1px solid #E4E7EB;
    display: flex;
    align-items: center;
  }

  .brand-link .brand-text {
    font-size: 1rem;
    font-weight: 700;
    color: #1F2937 !important; /* Teks gelap utama */
    letter-spacing: -.2px;
  }

  /* Wrapper menu */
  .sidebar-wrapper {
    padding: 0 12px;
  }

  /* Struktur Nav Link */
  .app-sidebar .nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    margin: 6px 0; 
    border-radius: 8px;
    color: #4B5563 !important; /* Warna abu-abu text murni dashboard lu */
    font-size: .87rem;
    font-weight: 500;
    border: 1px solid transparent;
    background: transparent; /* Idle state dibikin polosan biar clean */
    transition: all 0.15s ease;
  }

  /* State: Hover (Mending pakai warna glass light mode lu) */
  .app-sidebar .nav-link:hover {
    background: #FAFAFA !important;
    color: #FF7A00 !important; /* Icon/teks berubah oranye pas disentuh */
    border-color: #E4E7EB;
    transform: translateX(2px);
  }

  /* State: Active (Halaman Aktif - Kotak Oranye Soft khas Dashboard Lu) */
  .app-sidebar .nav-link.active {
    background: rgba(255, 122, 0, 0.06) !important; /* Warna oranye dim khas brand lu */
    border-color: rgba(255, 122, 0, 0.15) !important;
    color: #FF7A00 !important; /* Teks menyala warna oranye utama */
    font-weight: 600;
  }

  /* Icon Menu Settings */
  .app-sidebar .nav-icon {
    font-size: 1.1rem;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    color: inherit !important; /* Otomatis ngikut warna teks link */
  }

  .app-sidebar .nav-link p {
    margin: 0;
    color: inherit;

  }

  /* Override Total AdminLTE Light Variables */
  .app-sidebar[data-bs-theme="dark"] {
    --bs-body-color: #1F2937;
    --bs-body-bg: #FFFFFF;
  }
</style>

<aside class="app-sidebar shadow-sm">

    <div class="sidebar-brand">
        <a href="/" class="brand-link text-decoration-none d-flex align-items-center">
            <span class="brand-text">
                BI Dashboard
            </span>
        </a>
    </div>

    <div class="sidebar-wrapper">
        <nav class="mt-3">
            <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu">                
              <li class="nav-item">
                  <a href="/brand_performance/" class="nav-link {% if request.path == '/brand_performance/' %}active{% endif %}">
                      <i class="nav-icon bi bi-bar-chart"></i>
                      <p>Brand Performance</p>
                  </a>
              </li>
              <li class="nav-item">
                  <a href="/brand_performance/" class="nav-link {% if request.path == '/consolidated_sales/' %}active{% endif %}">
                      <i class="nav-icon bi bi-graph-up"></i>
                      <p>Consolidated Sales</p>
                  </a>
              </li>
              <li class="nav-item">
                  <a href="/brand_performance/" class="nav-link {% if request.path == '/brand_insight/' %}active{% endif %}">
                      <i class="nav-icon bi bi-lightbulb"></i>
                      <p>Brand Insight</p>
                  </a>
              </li>
              <li class="nav-item">
                  <a href="/brand_performance/" class="nav-link {% if request.path == '/ads_dashboard/' %}active{% endif %}">
                      <i class="nav-icon bi bi-megaphone"></i>
                      <p>Ads Dashboard</p>
                  </a>
              </li>
            </ul>
        </nav>
    </div>

</aside>
